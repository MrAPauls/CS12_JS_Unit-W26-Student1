<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>T8A - Colour Picker</title>
  </head>

  <body>
    <!-- Text -->
    <label for="colorPicker">Choose a color:</label>
    <!-- Input Box -->
    <input type="text" id ="colorPicker" class="colour" name="colour" value="blue" />
    <!-- Button -->
    <button class="pick" onclick="changeColour()">Change Colour</button>

    <script>
      //function goes here
      function changeColour() {
        let userColour = document.querySelector(".colour").value;
        document.body.style.backgroundColor = userColour;
      }
    </script>
  </body>
</html>
