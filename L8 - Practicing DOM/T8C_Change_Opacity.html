<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>T8C - Change Opacity</title>

    <style>
      .box {
        background-color: blue;
        height: 100px;
        width: 250px;
      }
    </style>
  </head>
  <body>
    <h1>DOM TASK - Change Opacity</h1>

    <div class="box">Box</div>
    <br />
    <button class="btnLight">Lighter!</button>
    <button class="btnDark">Darker!</button>

    <script>
      // ELEMENTS
      let box_obj = document.querySelector(".box");
      box_obj.style.opacity = 0.5; //set box to starting opacity on LOAD

      //VARIABLES
      //opacity variable
      let opacityValue = 0.5;

      //FUNCTIONS
      //light function decreases opacity
      function light() {
        opacityValue -= 0.1;
        box_obj.style.opacity = opacityValue;
      }
      document.querySelector(".btnLight").addEventListener("click", light);

      //dark function increases opacity
      function dark() {
        opacityValue += 0.1;
        box_obj.style.opacity = opacityValue;
      }

      document.querySelector(".btnDark").addEventListener("click", dark);

      //EVENT LISTENERS
      //add a click event to light button that calls the light function
      //add a click event to dark button that calls the dark function
    </script>
  </body>
</html>
