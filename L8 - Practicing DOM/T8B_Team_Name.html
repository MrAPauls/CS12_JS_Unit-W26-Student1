<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>T8B - Team Name</title>
  </head>

  <body>
    <h3>Hover over image to get caption</h3>
    <img
      src="rural_logo.png"
      height="125px"
      onmouseover="document.querySelector('#caption').value = 'Rural'"
    />
    <img
      src="colonelgray_logo.jpg"
      height="125px"
      alt="Colonel Gray HS"
      onmouseover="changeCaption(this.alt)"
    />
    <img
      src="bluefield_logo.png"
      height="125px"
      alt="Bluefield"
      onmouseover="changeCaption(this.alt)"
      onmouseout="changeCaption('')"
    />
    <br />
    <input type="text" id="caption" name="caption" value="" size="80px" />

    <script>
      //place function(s) here
      const captionBox = document.querySelector("#caption");
      function changeCaption(schoolName) {
        captionBox.value = schoolName;
      }

      function rural() {
        captionBox.value = "Charlottetown Rural High School";
      }
      function gray() {
        captionBox.value = "Colonel Gray High School";
      }
      function blue() {
        captionBox.value = "Bluefield High School";
      }
      function empty() {
        captionBox.value = "";
      }
      // don't forget to add event handlers to each img
    </script>
  </body>
</html>
