<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>T6B - Events - Three Images</title>
  </head>

  <body>
    <p>
      Choose three images and put them on your webpage. When you hover over each
      image, the background color of the page should change.
    </p>
    <img
      src="apples.jpg"
      width="200px"
      onMouseOver="document.bgColor='red';"
      onMouseOut="document.bgColor='white';"
    />

    <img
      src="bananas.jpg"
      width="200px"
      onMouseOver="document.bgColor='yellow';"
      onMouseOut="document.bgColor='white';"
    />

    <img
      src="kiwi.jpg"
      width="200px"
      onMouseOver="document.bgColor='green';"
      onMouseOut="document.bgColor='white';"
    />
  </body>
</html>
